name: build-test-publish

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore EngravingStation.sln
      - name: Build
        run: dotnet build EngravingStation.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test EngravingStation.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Publish win-x64
        run: dotnet publish EngravingStation.App/EngravingStation.App.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true --output artifacts/win-x64
      - name: Publish win-x86
        run: dotnet publish EngravingStation.App/EngravingStation.App.csproj --configuration Release --runtime win-x86 --self-contained true -p:PublishSingleFile=true --output artifacts/win-x86
      - uses: actions/upload-artifact@v4
        with:
          name: EngravingStation-windows
          path: artifacts/**
